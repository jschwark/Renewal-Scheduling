<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q2 Renewal Scheduling Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
.container{max-width:780px;margin:2rem auto;background:#fff;border-radius:16px;border:1px solid #e0ddd6;overflow:hidden;}
.header{padding:1.25rem 1.25rem 0.75rem;border-bottom:1px solid #e0ddd6;}
.badge{font-size:11px;padding:3px 8px;border-radius:8px;display:inline-block;}
.badge-progress{background:#E6F1FB;color:#185FA5;}
.badge-done{background:#E1F5EE;color:#0F6E56;}
.badge-alert{background:#FCEBEB;color:#A32D2D;}
.badge-warn{background:#FAEEDA;color:#854F0B;}
.summary-bar{display:flex;gap:12px;padding:0.75rem 1.25rem;background:#f5f5f3;border-bottom:1px solid #e0ddd6;}
.s-chip{display:flex;flex-direction:column;align-items:center;flex:1;}
.s-val{font-size:18px;font-weight:500;color:#1a1a1a;}
.s-lbl{font-size:10px;color:#666;margin-top:1px;}
.tabs{display:flex;gap:4px;padding:0.75rem 1.25rem 0;border-bottom:1px solid #e0ddd6;}
.tab{font-size:13px;padding:6px 14px;border-radius:8px;border:1px solid transparent;cursor:pointer;background:transparent;color:#666;}
.tab.active{background:#f5f5f3;border-color:#ccc;color:#1a1a1a;font-weight:500;}
.search-bar{padding:0.75rem 1.25rem;display:flex;align-items:center;gap:8px;}
.search-bar input{flex:1;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #ddd;outline:none;background:#fff;color:#1a1a1a;}
.search-bar input:focus{border-color:#999;}
.sort-sel{font-size:12px;padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;}
.rep-list{padding:0 1.25rem 1.25rem;display:flex;flex-direction:column;gap:8px;}
.rep-card{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color 0.15s;}
.rep-card:hover{border-color:#aaa;}
.rep-card.done{border-left:3px solid #1D9E75;}
.rep-card.alert{border-left:3px solid #E24B4A;}
.rep-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rep-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
.rep-name{font-size:14px;font-weight:500;color:#1a1a1a;flex:1;}
.prog-row{display:flex;align-items:center;gap:8px;}
.prog-track{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;}
.prog-label{font-size:11px;color:#888;min-width:36px;text-align:right;}
.week-grid{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #eee;}
.week-grid.open{display:block;}
.week-cols{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;}
.week-col{min-width:58px;text-align:center;flex-shrink:0;}
.week-label{font-size:10px;color:#888;margin-bottom:4px;line-height:1.3;}
.week-bar-wrap{height:48px;display:flex;align-items:flex-end;justify-content:center;}
.week-bar{width:32px;border-radius:3px 3px 0 0;min-height:2px;}
.week-count{font-size:11px;color:#888;margin-top:2px;}
.stats-row{display:flex;gap:8px;margin-top:8px;}
.stat-chip{flex:1;background:#f5f5f3;border-radius:8px;padding:6px 8px;text-align:center;}
.stat-chip .val{font-size:16px;font-weight:500;color:#1a1a1a;}
.stat-chip .lbl{font-size:10px;color:#888;margin-top:1px;}
.footer{padding:0.75rem 1.25rem;border-top:1px solid #e0ddd6;font-size:11px;color:#aaa;text-align:center;}
@media(max-width:600px){
  .summary-bar{flex-wrap:wrap;}
  .s-chip{min-width:30%;}
  .container{margin:0;border-radius:0;}
}
</style>
</head>

<div class="container">

<div class="header">

  <div style="font-size:13px;color:#666;margin-top:4px;">Schedule all your opps → earn prize eligibility 🏆</div>

<div id="summary-bar" class="summary-bar"></div>

<div class="tabs">
  <button class="tab active" onclick="setTab('all',this)">All reps</button>

    <div class="s-chip"><div class="s-val">${doneReps}</div><div class="s-lbl">reps at 100%</div></div>
    <div class="s-chip"><div class="s-val">${totalReps}</div><div class="s-lbl">total reps</div></div>
    <div class="s-chip"><div class="s-val">${totalSched}/${totalOpps}</div><div class="s-lbl">opps scheduled</div></div>
    <div class="s-chip"><div class="s-val">${Math.round(totalSched/totalOpps*100)}%</div><div class="s-lbl">team progress</div></div>
    <div class="s-chip"><div class="s-val" style="color:#A32D2D;">${needsAlert}</div><div class="s-lbl">need reschedule</div></div>`;
}

function renderWeeks(rep){
  const mx=Math.max(...WEEK_KEYS.map(k=>rep.weeks[k]||0),1);
  const cols=WEEK_KEYS.map((k,i)=>{
    const v=rep.weeks[k]||0;
    const h=Math.max(4,Math.round((v/mx)*44));
    const isCur=k==='2026-04-27';
    const barColor=isCur?'#378ADD':'#1D9E75';
    return `<div class="week-col">
      <div class="week-label">${WEEK_LABELS[i]}</div>
      <div class="week-bar-wrap"><div class="week-bar" style="height:${h}px;background:${v>0?barColor:'#eee'}"></div></div>
      <div class="week-count">${v>0?v:''}</div>
    </div>`;
  }).join('');
  return `<div class="week-grid${openCards.has(rep.name)?' open':''}">
    <div style="font-size:11px;color:#888;margin-bottom:6px;">Scheduled per week (future)</div>
    <div class="week-cols">${cols}</div>
  </div>`;
}

function toggleCard(name){
  if(openCards.has(name)) openCards.delete(name);
  else openCards.add(name);
  render();
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const sort=document.getElementById('sort-sel').value;
  let data=RAW.filter(r=>{
    if(q&&!r.name.toLowerCase().includes(q)) return false;
    if(currentTab==='done') return pct(r)===100;
    if(currentTab==='needs') return r.needs_reschedule>0||pct(r)<30;
    return true;
  });
  data=data.slice().sort((a,b)=>{
    if(sort==='pct-desc') return pct(b)-pct(a);
    if(sort==='pct-asc') return pct(a)-pct(b);
    if(sort==='name') return a.name.localeCompare(b.name);
    if(sort==='remaining-desc') return(b.not_scheduled+b.needs_reschedule)-(a.not_scheduled+a.needs_reschedule);
    return 0;
  });
  const list=document.getElementById('rep-list');
  list.innerHTML=data.map((r,idx)=>{
    const p=pct(r);
    const isDone=p===100;
    const hasAlert=r.needs_reschedule>0;
    const ac=AVATAR_COLORS[idx%AVATAR_COLORS.length];
    const fillColor=isDone?'#1D9E75':p>=70?'#378ADD':p>=40?'#EF9F27':'#E24B4A';
    let badge='';
    if(isDone) badge=`<span class="badge badge-done">🏆 Prize eligible</span>`;
    else if(hasAlert) badge=`<span class="badge badge-alert">${r.needs_reschedule} to reschedule</span>`;
    else if(p>=70) badge=`<span class="badge badge-progress">${p}% done</span>`;
    else badge=`<span class="badge badge-warn">${r.not_scheduled} remaining</span>`;
    return `<div class="rep-card${isDone?' done':hasAlert?' alert':''}" onclick="toggleCard('${r.name.replace(/'/g,"\\'")}')">
      <div class="rep-top">
        <div class="rep-avatar" style="background:${ac.bg};color:${ac.fg};">${initials(r.name)}</div>
        <div class="rep-name">${r.name}</div>
        ${badge}
      </div>
      <div class="prog-row">
        <div class="prog-track"><div class="prog-fill" style="width:${p}%;background:${fillColor};"></div></div>
        <div class="prog-label">${r.scheduled}/${r.total}</div>
      </div>
      <div class="stats-row">
        <div class="stat-chip"><div class="val">${r.scheduled}</div><div class="lbl">scheduled</div></div>
        <div class="stat-chip"><div class="val" style="color:${r.not_scheduled>0?'#A32D2D':'#888'}">${r.not_scheduled}</div><div class="lbl">not scheduled</div></div>
        <div class="stat-chip"><div class="val" style="color:${r.needs_reschedule>0?'#854F0B':'#888'}">${r.needs_reschedule}</div><div class="lbl">reschedule</div></div>
      </div>
      ${renderWeeks(r)}
    </div>`;
  }).join('');
}

buildSummary();
render();
</script>
</body>
</html>
